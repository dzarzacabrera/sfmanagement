services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sfmanagement
      POSTGRES_PASSWORD: sfmanagement_pass
      POSTGRES_DB: sfmanagement
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfmanagement"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=sfmanagement;Username=sfmanagement;Password=sfmanagement_pass"
    depends_on:
      db:
        condition: service_healthy
